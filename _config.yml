title: Tributary
tagline: What you can build with autonomous money streams
description: >-
  A catalog of use-cases for Tributary — the protocol for composable,
  autonomous, recurring payments on Solana. A special mtnDAO edition.
url: ""
baseurl: ""

# No external theme — in-repo layouts/includes/sass
theme: null

# Collections
collections:
  use-cases:
    output: true
    permalink: /:collection/:name/

defaults:
  - scope:
      path: ""
      type: use-cases
    values:
      layout: use-case
  - scope:
      path: ""
    values:
      layout: default

# Edition metadata (newspaper flavor)
edition: "Vol. I"
event: "mtnDAO Edition"
event_dates: "Jul 2026"

# Plugins
plugins:
  - jekyll-feed

# Exclude build/dev noise
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - _scripts
  - DESIGN.md
  - use-cases

sass:
  style: compressed
  sass_dir: _sass
  verbose: true

# Liquid perf
liquid:
  error_mode: warn
  strict_filters: false

markdown: kramdown
kramdown:
  parse_block_html: true
  syntax_highlighter: rouge

# Keep these raw
keep_files:
  - assets/img
