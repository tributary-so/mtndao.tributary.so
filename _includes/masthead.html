<header class="masthead">
  <div class="container">
    <div class="masthead__edition">
      <span>{{ site.edition }}</span>
      <span>{{ site.event }}</span>
      <span>{{ site.event_dates }}</span>
    </div>

    <a href="{{ '/' | relative_url }}" aria-label="mtnDAO — home">
      <img class="masthead__logo" src="{{ '/assets/img/mtndao.svg' | relative_url }}" alt="mtnDAO" height="40">
    </a>

    <h1 class="masthead__nameplate">
      Tributary <span class="x">@</span> mtnDAO
    </h1>

    <p class="masthead__tagline">{{ site.tagline }}</p>
  </div>
</header>
